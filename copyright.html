
<form action="https://ecopyright.ieee.org/ECTT/IntroPage.jsp" style="width: 100%; max-width: 450px" method="post">
          <input type="hidden" name="PubTitle" value="2026 Second International Conference on Emerging Computational Intelligence (ICECI)">
          <input type="hidden" name="ArtSource" value="69159">

          <div class="form-group my-2">
            <input required="" class="form-control" type="text" name="ArtId" placeholder="Paper ID">
          </div>
          <div class="form-group my-2">
            <input required="" class="form-control" type="text" name="ArtTitle" placeholder="Article Title">
          </div>
          <div class="form-group my-2">
            <input required="" class="form-control" type="text" name="AuthName" placeholder="Author Name(s)">
          </div>

          <div class="form-group my-2">
            <input required="" class="form-control" type="text" name="AuthEmail" placeholder="Authors Email ID(s)">
          </div>
          <input type="hidden" name="rtrnurl" value="https://cmt3.research.microsoft.com/ICECI2026/Submission/Index">
          <input type="hidden" name="ArtDate" id="ArtDate">
          <input type="submit" class="btn btn-primary" style="border-radius: 0" >
        </form>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const now = new Date();

  // Format: MM/DD/YYYY HH:MM
  const formatted =
    String(now.getMonth() + 1).padStart(2, '0') + '/' +
    String(now.getDate()).padStart(2, '0') + '/' +
    now.getFullYear() + ' ' +
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');

  document.getElementById('ArtDate').value = formatted;
});
</script>
